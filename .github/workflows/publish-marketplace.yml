name: Publish to VS Marketplace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore Unoffcial-VS-MCP.sln

      - name: Build VS2022/2026 Extension (Release)
        run: msbuild src\VsMcp.Extension\VsMcp.Extension.csproj /p:Configuration=Release /p:DeployExtension=false /verbosity:minimal

      - name: Build VS2019 Extension (Release)
        run: msbuild src\VsMcp.Extension.VS2019\VsMcp.Extension.VS2019.csproj /p:Configuration=Release /p:DeployExtension=false /verbosity:minimal

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          # Delete existing release and tag if present (overwrite)
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
          }
          gh release create $tag `
            "src\VsMcp.Extension\VsMcp.Extension.vsix#VS MCP Server (VS 2022/2026)" `
            "src\VsMcp.Extension.VS2019\VsMcp.Extension.VS2019.vsix#VS MCP Server (VS 2019)" `
            --title $tag `
            --target ${{ github.sha }} `
            --generate-notes

      - name: Publish VS2022/2026 Extension to Marketplace
        continue-on-error: true
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: src\VsMcp.Extension\VsMcp.Extension.vsix
          publish-manifest-file: src\VsMcp.Extension\publishManifest.json
          personal-access-code: ${{ secrets.VS_MARKETPLACE_PAT }}

      - name: Publish VS2019 Extension to Marketplace
        continue-on-error: true
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: src\VsMcp.Extension.VS2019\VsMcp.Extension.VS2019.vsix
          publish-manifest-file: src\VsMcp.Extension.VS2019\publishManifest.json
          personal-access-code: ${{ secrets.VS_MARKETPLACE_PAT }}
